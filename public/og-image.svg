<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 그라데이션 배경 -->
    <rect width="1200" height="630" fill="url(#gradient)"/>
    
    <!-- 메인 텍스트 -->
    <text x="600" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
        교통사고 과실비율 예측
    </text>
    
    <!-- 서브 텍스트 -->
    <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
        AI 기반 분석 서비스
    </text>

    <!-- 그라데이션 정의 -->
    <defs>
        <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#1E40AF"/>
        </linearGradient>
    </defs>
</svg> 